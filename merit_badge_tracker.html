<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merit Badge Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0e09;--surface:#131610;--surface2:#1a1e16;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --text:#e4e6d2;--muted:#6e7566;
  --accent:#7ec244;--accent-d:#3e6120;--accent-g:rgba(126,194,68,0.12);
  --eagle:#48a0c2;--eagle-d:#183a4e;--eagle-g:rgba(72,160,194,0.12);
  --gold:#c9a94c;--danger:#c05a46;
  --ease:cubic-bezier(0.16,1,0.3,1);--ease-s:cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 10% 5%,rgba(126,194,68,0.04) 0%,transparent 60%),
  radial-gradient(ellipse 50% 70% at 90% 95%,rgba(72,160,194,0.04) 0%,transparent 60%)}
.wrap{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 2rem 5rem}

/* HEADER */
header{padding:2.5rem 0 2rem;border-bottom:1px solid var(--border);margin-bottom:2rem;
  display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.3em;color:var(--accent);
  text-transform:uppercase;margin-bottom:.4rem;display:flex;align-items:center;gap:10px}
.eyebrow::before,.eyebrow::after{content:'';display:block;width:20px;height:1px;background:var(--accent)}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.2rem,8vw,6.5rem);line-height:.88;letter-spacing:.04em}
h1 em{color:var(--accent);font-style:normal}
.header-sub{font-size:13px;color:var(--muted);margin-top:.5rem;font-style:italic}
.export-btn{padding:10px 18px;background:transparent;border:1px solid var(--border-h);border-radius:8px;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;align-self:flex-start;margin-top:.5rem}
.export-btn:hover{border-color:var(--accent-d);color:var(--accent)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);
  border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem;
  animation:up .6s var(--ease) .05s both}
.stat{background:var(--surface);padding:1.2rem 1.5rem;text-align:center;transition:background .2s}
.stat:hover{background:var(--surface2)}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;line-height:1;letter-spacing:.03em}
.stat-n.g{color:var(--accent)}.stat-n.b{color:var(--eagle)}.stat-n.gold{color:var(--gold)}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;margin-top:4px;font-family:'DM Mono',monospace}

/* EAGLE PANEL */
.eagle-panel{display:flex;align-items:center;gap:2rem;background:var(--surface);
  border:1px solid var(--eagle-d);border-radius:12px;padding:1.5rem 2rem;margin-bottom:1.5rem;
  position:relative;overflow:hidden;animation:up .6s var(--ease) .15s both}
.eagle-panel::before{content:'';position:absolute;inset:0;background:var(--eagle-g);pointer-events:none}
.ring-svg{transform:rotate(-90deg);flex-shrink:0}
.ring-track{fill:none;stroke:var(--eagle-d);stroke-width:5}
.ring-fill{fill:none;stroke:var(--eagle);stroke-width:5;stroke-linecap:round;
  stroke-dasharray:226.2;stroke-dashoffset:226.2;transition:stroke-dashoffset 1.2s var(--ease)}
.ring-inner{font-family:'Bebas Neue',sans-serif;font-size:20px;fill:var(--text);text-anchor:middle;dominant-baseline:middle}
.ring-sub{font-size:9px;fill:var(--muted);text-anchor:middle;font-family:'DM Mono',monospace}
.eagle-info{flex:1;min-width:0;position:relative;z-index:1}
.eagle-info h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;color:var(--eagle)}
.eagle-info p{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.6}
.eagle-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.e-pill{font-size:10px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:4px;letter-spacing:.04em}
.e-pill.done{background:var(--eagle-d);color:var(--eagle)}
.e-pill.todo{background:rgba(255,255,255,0.03);color:var(--muted);border:1px solid var(--border)}

/* CONTROLS */
.controls{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;
  animation:up .6s var(--ease) .25s both}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  padding:10px 14px 10px 38px;outline:none;transition:border-color .2s}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:var(--accent-d)}
.s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.fbtn{padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--border-h);color:var(--text)}
.fbtn.active{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}
.fbtn.ef.active{background:var(--eagle-d);border-color:var(--eagle);color:var(--eagle)}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;gap:12px;margin:2.2rem 0 .9rem}
.sec-head h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;color:var(--muted);white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-ct{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}

/* GRID */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:8px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .2s,background .2s,transform .2s var(--ease-s);
  animation:up .45s var(--ease) both}
.card::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;pointer-events:none}
.card:hover{border-color:var(--border-h);transform:translateY(-2px)}
.card:hover::after{opacity:1}
.card.earned{border-color:var(--accent-d)}
.card.earned::after{background:var(--accent-g);opacity:1}
.card.earned:hover{border-color:var(--accent)}
.card.erq{border-color:var(--eagle-d)}
.card.erq::after{background:var(--eagle-g);opacity:.5}
.card.erq:hover{border-color:var(--eagle)}
.card.erq.earned{border-color:var(--eagle-d)}
.card.erq.earned::after{opacity:1}
.card.erq.earned:hover{border-color:var(--eagle)}

.card-body{position:relative;z-index:1;padding:13px 14px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px}
.badge-name{font-size:13.5px;font-weight:500;color:var(--text);line-height:1.3}
.badge-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.07em;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.tag.er{background:var(--eagle-d);color:var(--eagle)}

/* CHECKBOX */
.chk{width:22px;height:22px;flex-shrink:0;border:1.5px solid var(--border-h);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s var(--ease-s);cursor:pointer;position:relative;z-index:2}
.chk:hover{border-color:var(--accent-d)}
.chk.on{background:var(--accent);border-color:var(--accent)}
.chk-mark{width:11px;height:7px;border-left:2px solid #fff;border-bottom:2px solid #fff;
  transform:rotate(-45deg) translate(1px,-1px);opacity:0;transition:opacity .15s}
.chk.on .chk-mark{opacity:1}

.card-meta{font-size:11px;font-family:'DM Mono',monospace;margin-bottom:8px}
.card-meta.ed{color:var(--accent)}.card-meta.pr{color:var(--muted)}

/* MINI BAR */
.mini-bar{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;margin-bottom:9px;overflow:hidden}
.mini-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .4s var(--ease)}
.card.erq .mini-fill{background:var(--eagle)}

/* EXPAND */
.expand-row{display:flex;align-items:center;gap:6px;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);
  transition:color .15s;background:none;border:none;padding:0;width:100%;text-align:left}
.expand-row:hover{color:var(--text)}
.arr{display:inline-block;transition:transform .2s;font-size:10px}
.card.open .arr{transform:rotate(180deg)}

/* REQS PANEL — CSS transition via max-height */
.reqs-panel{overflow:hidden;max-height:0;transition:max-height .35s var(--ease)}
.card.open .reqs-panel{max-height:800px}
.reqs-inner{border-top:1px solid var(--border);margin-top:10px;padding-top:10px}

.req-row{display:flex;align-items:flex-start;gap:8px;padding:5px 4px;cursor:pointer;
  border-radius:5px;transition:background .15s}
.req-row:hover{background:rgba(255,255,255,0.03)}
.req-dot{width:14px;height:14px;border:1.5px solid var(--border-h);border-radius:3px;flex-shrink:0;
  margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.req-dot.on{background:var(--accent);border-color:var(--accent)}
.req-dot.on::after{content:'✓';font-size:9px;color:#fff;line-height:1;margin-top:1px}
.card.erq .req-dot.on{background:var(--eagle);border-color:var(--eagle)}
.req-txt{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
.req-row:hover .req-txt{color:var(--text)}
.req-dot.on+.req-txt{text-decoration:line-through;color:rgba(110,117,102,0.55)}

.panel-footer{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.date-row{display:flex;align-items:center;gap:6px}
.date-row label{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);white-space:nowrap}
.date-row input[type=date]{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:5px 8px;
  outline:none;flex:1;cursor:pointer;transition:border-color .2s}
.date-row input[type=date]:focus{border-color:var(--accent-d)}
.date-clr{font-size:11px;color:var(--danger);cursor:pointer;background:none;border:none;
  font-family:'DM Mono',monospace;padding:0;opacity:.7;transition:opacity .15s}
.date-clr:hover{opacity:1}
.action-btn{width:100%;padding:7px;border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:.07em;cursor:pointer;text-transform:uppercase;transition:background .15s,border-color .15s}
.mark-btn{background:rgba(126,194,68,0.07);border:1px solid var(--accent-d);color:var(--accent)}
.mark-btn:hover{background:var(--accent-d)}
.unmark-btn{background:rgba(192,90,70,0.07);border:1px solid rgba(192,90,70,0.4);color:var(--danger)}
.unmark-btn:hover{background:rgba(192,90,70,0.15)}

.empty{text-align:center;padding:4rem 2rem;color:var(--muted);font-style:italic;font-size:14px}

@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important}}
@media(max-width:640px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .eagle-panel{flex-direction:column;align-items:flex-start}
  .badge-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:420px){.badge-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">

<header>

</div>

<div class="controls">

<div id="main"></div>
</div>

];

  'Swimming':['Show swimming ability — 100 yards continuously using two strokes','Demonstrate survival float for 5 minutes','Float on back for 1 minute','Swim on your side for 25 yards','Demonstrate reaching and throwing rescues','Explain BSA Safe Swim Defense and the buddy system'],
  'Camping':['Explain the Leave No Trace seven principles and BSA Outdoor Code','Complete 20 nights camping, including three long-term camps','Demonstrate campsite selection, setup, and striking','Show how to build and extinguish a campfire safely','Cook two meals at a campsite using a camp stove or fire','Demonstrate first aid for injuries common in the outdoors'],
  'Cooking':['Explain food safety and sanitation and proper food handling','Demonstrate cooking methods: frying, baking, boiling, simmering, steaming','Cook a breakfast outdoors on a camp stove or open fire','Plan and prepare a trail lunch on a hike','Cook a dinner using a Dutch oven or foil pack method','Prepare a meal for your patrol using no-refrigeration ingredients','Discuss food groups, nutrition, and a balanced diet'],
  'Programming':['Discuss the history of programming and societal impact','Explain the software development lifecycle','Demonstrate variables, conditionals, loops, and functions','Build a program or app that solves a real-world problem','Explain cybersecurity best practices and data privacy','Present and demonstrate your program to your counselor'],
  'Citizenship in the Community':['Define citizenship and list rights and duties of US citizens','Interview a community leader or public official','Attend a meeting of a local government body','Volunteer in a community service project','Draw a map of your community and identify key resources','Research two community organizations and their missions'],
  'Citizenship in the Nation':['Explain the Constitution, Bill of Rights, and amendments','Describe the three branches of federal government','Write a letter to a public official on an issue of concern','Explain the Electoral College and how presidents are elected','Visit a US historical site or monument and report your findings'],

  'Personal Fitness':['Complete a physical fitness self-assessment','Develop and follow a 12-week personal fitness program','Demonstrate proper form for strength, cardiovascular, and flexibility exercises','Discuss nutrition and its role in health and performance','Explain the harmful effects of tobacco, alcohol, and drugs'],
  'Environmental Science':['Conduct an ecology study of a local ecosystem over time','Perform a soil experiment and discuss soil conservation','Study air and water pollution sources and prevention measures','Learn about energy resources, alternatives, and conservation','Research environmental legislation and its impact on daily life'],
  'Family Life':['Discuss your responsibilities at home with your parents or guardians','Help plan and prepare a family budget for one month','Plan and lead a family activity or project for six months','Discuss challenges facing modern families and solutions'],
  'Communication':['Describe the communication process and barriers to communication','Prepare and deliver a 5-minute speech on a topic of your choice','Interview someone and write a detailed report of the interview','Write a personal letter and a persuasive essay','Practice active listening and report back what you learned'],
  'Emergency Preparedness':['Earn First Aid merit badge before this one','Demonstrate first-aid procedures for emergency situations','Build a 72-hour emergency preparedness kit for your family','Learn your community's warning systems and evacuation routes','Assist in a community emergency preparedness exercise'],
  'Lifesaving':['Swim 400 yards using four different strokes','Demonstrate reaching, throwing, and wading rescues','Demonstrate carry and tow rescues in deep water','Show removal of a drowning victim from the water','Complete a mock rescue scenario under counselor supervision'],

  'Hiking':['Hike 5 miles on a day hike','Hike 10 miles on a day hike','Hike 15 miles on a day hike','Complete a 20-mile hike in one day','Demonstrate proper gear, footwear selection, and Leave No Trace practices'],
  'Rowing':['Demonstrate swimming ability to your counselor','Explain water safety rules and rescue procedures','Row a boat with proper technique for at least 1 mile','Demonstrate feathering oars and backing the boat','Perform a swamped boat rescue and explain canoe rescue'],
};

// ── STATE ───────────────────────────────────────────────────────────────────
const STORE_KEY = 'mb-tracker-v1';

function loadDB() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(STORE_KEY)); } catch(e){}
  const d = saved || {};
  BADGES.forEach(({n}) => {
    if (!d[n]) d[n] = { earned: false, date: null, reqs: makeReqs(n) };
    if (!Array.isArray(d[n].reqs)) d[n].reqs = makeReqs(n);
  });
  return d;
}

function makeReqs(name) {
  return (DEF_REQS[name] || []).map(t => ({t, d: false}));
}

function persist() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(db)); } catch(e){}
}

let db = loadDB();
let activeFilter = 'all';
let openSet = new Set();

// ── HELPERS ─────────────────────────────────────────────────────────────────
function getStatus(name) {
  const b = db[name];
  if (b.earned) return 'earned';
  if (b.reqs.some(r => r.d)) return 'in-progress';
  return 'not-started';
}

function getPct(name) {
  const r = db[name].reqs;
  if (!r.length) return 0;
  return Math.round(r.filter(x => x.d).length / r.length * 100);
}

function fmtDate(iso) {
  if (!iso) return null;
  return new Date(iso + 'T12:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

// Convert badge name to a safe element ID (no special chars)
function toId(name) {
  return 'b-' + name.replace(/[^a-zA-Z0-9]/g, '_');
}

// ── ACTIONS (called via data-* attributes + event delegation) ────────────────
function doToggleEarned(name) {
  const b = db[name];
  b.earned = !b.earned;
  if (b.earned) {
    if (!b.date) b.date = new Date().toISOString().slice(0,10);
    b.reqs.forEach(r => r.d = true);
  } else {
    b.date = null;
    b.reqs.forEach(r => r.d = false);
  }
  persist();
  refreshCard(name);
  updateStats();
}

function doToggleReq(name, idx) {
  const b = db[name];
  b.reqs[idx].d = !b.reqs[idx].d;
  // auto-earn when all done
  const allDone = b.reqs.length > 0 && b.reqs.every(r => r.d);
  if (allDone && !b.earned) {
    b.earned = true;
    if (!b.date) b.date = new Date().toISOString().slice(0,10);
  }
  // auto-unearn when none done
  if (!b.reqs.some(r => r.d) && b.earned) {
    b.earned = false;
    b.date = null;
  }
  persist();
  refreshCard(name);
  updateStats();
}

function doSetDate(name, val) {
  const b = db[name];
  b.date = val || null;
  if (val && !b.earned) {
    b.earned = true;
    b.reqs.forEach(r => r.d = true);
  }
  if (!val) { b.earned = false; }
  persist();
  refreshCard(name);
  updateStats();
}

function doMarkEarned(name) {
  const b = db[name];
  b.earned = true;
  if (!b.date) b.date = new Date().toISOString().slice(0,10);
  b.reqs.forEach(r => r.d = true);
  persist();
  refreshCard(name);
  updateStats();
}

function doUnmark(name) {
  const b = db[name];
  b.earned = false;
  b.date = null;
  b.reqs.forEach(r => r.d = false);
  persist();
  refreshCard(name);
  updateStats();
}

function doToggleCard(name) {
  if (openSet.has(name)) openSet.delete(name);
  else openSet.add(name);
  const el = document.getElementById(toId(name));
  if (el) el.classList.toggle('open', openSet.has(name));
}

// ── CARD HTML ────────────────────────────────────────────────────────────────
function cardHTML(name, delay) {
  const b = db[name];
  const st = getStatus(name);
  const isEagle = EAGLE.has(name);
  const p = getPct(name);
  const doneCount = b.reqs.filter(r => r.d).length;
  const dateStr = fmtDate(b.date);
  const isOpen = openSet.has(name);
  const eid = toId(name);
  const nj = JSON.stringify(name); // safe for inline onclick

  const cls = ['card',
    st === 'earned' ? 'earned' : '',
    isEagle ? 'erq' : '',
    isOpen ? 'open' : ''
  ].filter(Boolean).join(' ');

  const reqs = b.reqs.map((r,i) => `
    <div class="req-row" onclick="event.stopPropagation();doToggleReq(${nj},${i})">
      <div class="req-dot ${r.d ? 'on' : ''}"></div>
      <span class="req-txt">${escH(r.t)}</span>
    </div>`).join('');

  const footer = `
    <div class="panel-footer" onclick="event.stopPropagation()">
      <div class="date-row">
        <label>Date earned:</label>
        <input type="date" value="${b.date || ''}" onchange="doSetDate(${nj},this.value)">
        ${b.date ? `<button class="date-clr" onclick="doSetDate(${nj},'')">✕</button>` : ''}
      </div>
      ${st !== 'earned'
        ? `<button class="action-btn mark-btn" onclick="doMarkEarned(${nj})">✓ Mark as Earned</button>`
        : `<button class="action-btn unmark-btn" onclick="doUnmark(${nj})">✕ Unmark Earned</button>`}
    </div>`;

  const metaHTML = dateStr
    ? `<div class="card-meta ed">✓ ${dateStr}</div>`
    : st === 'in-progress'
      ? `<div class="card-meta pr">${doneCount} / ${b.reqs.length} req${b.reqs.length !== 1 ? 's' : ''}</div>`
      : '';

  return `<div class="${cls}" id="${eid}" style="animation-delay:${delay}s"
    onclick="doToggleCard(${nj})">
    <div class="card-body">
      <div class="card-top">
        <div style="min-width:0">
          <div class="badge-name">${escH(name)}</div>
          ${isEagle ? '<div class="badge-tags"><span class="tag er">Eagle</span></div>' : ''}
        </div>
        <div class="chk ${b.earned ? 'on' : ''}"
          onclick="event.stopPropagation();doToggleEarned(${nj})">
          <div class="chk-mark"></div>
        </div>
      </div>
      ${metaHTML}
      ${b.reqs.length ? `<div class="mini-bar"><div class="mini-fill" style="width:${p}%"></div></div>` : ''}
      ${b.reqs.length ? `
        <button class="expand-row" onclick="event.stopPropagation();doToggleCard(${nj})">
          <span class="arr">▾</span>&nbsp;${b.reqs.length} requirement${b.reqs.length !== 1 ? 's' : ''}
        </button>
        <div class="reqs-panel">
          <div class="reqs-inner">${reqs}${footer}</div>
        </div>` : ''}
    </div>
  </div>`;
}

function escH(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// In-place card refresh — preserves open state
function refreshCard(name) {
  const old = document.getElementById(toId(name));
  if (!old) return;
  const wasOpen = old.classList.contains('open');
  if (wasOpen) openSet.add(name); else openSet.delete(name);
  const delay = parseFloat(old.style.animationDelay) || 0;
  const tmp = document.createElement('div');
  tmp.innerHTML = cardHTML(name, delay);
  old.replaceWith(tmp.firstElementChild);
}

// ── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const total = BADGES.length;
  const earned = BADGES.filter(({n}) => db[n].earned).length;
  const inProg = BADGES.filter(({n}) => getStatus(n) === 'in-progress').length;
  const eagleEarned = [...EAGLE].filter(n => db[n] && db[n].earned).length;
  const eagleTotal = EAGLE.size;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-earned').textContent = earned;
  document.getElementById('s-prog').textContent = inProg;
  document.getElementById('s-eagle').textContent = eagleEarned + ' / ' + eagleTotal;

  const pct = Math.round(eagleEarned / eagleTotal * 100);
  document.getElementById('ring-pct').textContent = pct + '%';
  const circ = 226.2;
  document.getElementById('ring-fill').style.strokeDashoffset = circ - (circ * pct / 100);

  document.getElementById('eagle-desc').textContent = eagleEarned === eagleTotal
    ? 'All Eagle-required merit badges earned — congratulations!'
    : `${eagleTotal - eagleEarned} Eagle-required badge${eagleTotal - eagleEarned !== 1 ? 's' : ''} remaining.`;

  const sorted = [...EAGLE].sort((a,b) => a.localeCompare(b));
  document.getElementById('eagle-pills').innerHTML = sorted.map(n => {
    const ok = db[n] && db[n].earned;
    return `<span class="e-pill ${ok ? 'done' : 'todo'}">${escH(n)}</span>`;
  }).join('');
}

// ── FILTER / SEARCH ──────────────────────────────────────────────────────────
function setFilter(btn) {
  activeFilter = btn.dataset.f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
function exportJSON() {
  const out = {
    exported: new Date().toISOString(),
    earned: BADGES.filter(({n}) => db[n].earned).map(({n}) => ({name:n, date:db[n].date})),
    inProgress: BADGES.filter(({n}) => getStatus(n) === 'in-progress').map(({n}) => ({
      name: n,
      reqsDone: db[n].reqs.filter(r=>r.d).length,
      reqsTotal: db[n].reqs.length
    }))
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'merit-badges.json';
  a.click();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();

  const filtered = BADGES.filter(({n}) => {
    if (q && !n.toLowerCase().includes(q)) return false;
    if (activeFilter === 'earned') return db[n].earned;
    if (activeFilter === 'in-progress') return getStatus(n) === 'in-progress';
    if (activeFilter === 'eagle') return EAGLE.has(n);
    return true;
  });

  if (!filtered.length) {
    document.getElementById('main').innerHTML = '<div class="empty">No badges match your search or filter.</div>';
    updateStats();
    return;
  }

  // Group by category preserving CAT_ORDER
  const byCat = {};
  filtered.forEach(({n,c}) => { (byCat[c] || (byCat[c] = [])).push(n); });

  let html = '';
  const renderCat = (cat) => {
    const names = byCat[cat];
    if (!names || !names.length) return;
    names.sort((a,b) => a.localeCompare(b));
    html += `<div class="sec-head">
      <h2>${escH(cat)}</h2><div class="sec-line"></div><div class="sec-ct">${names.length}</div>
    </div>
    <div class="badge-grid">
      ${names.map((n,i) => cardHTML(n, i * 0.018)).join('')}
    </div>`;
  };

  CAT_ORDER.forEach(renderCat);
  // Any overflow categories not in the order list
  Object.keys(byCat).filter(c => !CAT_ORDER.includes(c)).sort().forEach(renderCat);

  document.getElementById('main').innerHTML = html;
  updateStats();
}

render();
</script>
