<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merit Badge Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f0a;
    --surface: #141810;
    --surface2: #1c2118;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8ead5;
    --muted: #7a8070;
    --accent: #7eb84a;
    --accent-dim: #4a7028;
    --accent-glow: rgba(126,184,74,0.15);
    --eagle: #4a9eba;
    --eagle-dim: #1a4a5a;
    --eagle-glow: rgba(74,158,186,0.15);
    --gold: #c8a84b;
    --gold-dim: #5a4418;
    --danger: #c25e4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(126,184,74,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 90%, rgba(74,158,186,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 2rem 4rem; }

  /* HEADER */
  header {
    padding: 3rem 0 2rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .header-left {}

  .fleur { font-size: 11px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 10px; }
  .fleur::before, .fleur::after { content: ''; display: block; width: 24px; height: 1px; background: var(--accent); }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 7vw, 6rem);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .header-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 0.5rem;
    font-style: italic;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2rem;
    animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s both;
  }

  .stat {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    text-align: center;
    transition: background 0.2s;
  }
  .stat:hover { background: var(--surface2); }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    line-height: 1;
    letter-spacing: 0.03em;
  }
  .stat-num.green { color: var(--accent); }
  .stat-num.blue { color: var(--eagle); }
  .stat-num.gold { color: var(--gold); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* PROGRESS RING */
  .eagle-progress {
    display: flex;
    align-items: center;
    gap: 2rem;
    background: var(--surface);
    border: 1px solid var(--eagle-dim);
    border-radius: 12px;
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both;
    position: relative;
    overflow: hidden;
  }
  .eagle-progress::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--eagle-glow);
    pointer-events: none;
  }
  .ring-wrap { flex-shrink: 0; }
  svg.ring { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--eagle-dim); stroke-width: 5; }
  .ring-fill { fill: none; stroke: var(--eagle); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1); }
  .ring-label { font-family: 'Bebas Neue', sans-serif; font-size: 22px; fill: var(--text); text-anchor: middle; dominant-baseline: middle; }
  .ring-sub { font-size: 9px; fill: var(--muted); text-anchor: middle; dominant-baseline: middle; font-family: 'DM Mono', monospace; }
  .eagle-text h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.05em; color: var(--eagle); }
  .eagle-text p { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.6; }
  .eagle-bar-wrap { flex: 1; }
  .eagle-badges-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .eagle-mini { font-size: 10px; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.05em; }
  .eagle-mini.done { background: var(--eagle-dim); color: var(--eagle); }
  .eagle-mini.todo { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
    animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s both;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px 10px 36px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent-dim); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

  .filter-btn {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .filter-btn.eagle-filter.active { background: var(--eagle-dim); border-color: var(--eagle); color: var(--eagle); }

  /* SECTION HEADERS */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 2rem 0 1rem;
  }
  .section-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  /* BADGE GRID */
  .badge-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 8px;
  }

  .badge-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }

  .badge-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .badge-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  .badge-card.earned { border-color: var(--accent-dim); }
  .badge-card.earned::before { background: var(--accent-glow); opacity: 1; }
  .badge-card.earned:hover { border-color: var(--accent); }

  .badge-card.eagle-req { border-color: var(--eagle-dim); }
  .badge-card.eagle-req::before { background: var(--eagle-glow); opacity: 0.5; }
  .badge-card.eagle-req:hover { border-color: var(--eagle); }
  .badge-card.eagle-req.earned::before { opacity: 1; }

  .card-inner { position: relative; z-index: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }

  .badge-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .badge-tags { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }

  .tag {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .tag.eagle { background: var(--eagle-dim); color: var(--eagle); }
  .tag.cat { background: rgba(255,255,255,0.05); color: var(--muted); }

  .check-box {
    width: 22px; height: 22px;
    border: 1.5px solid var(--border-hover);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .check-box.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-box .checkmark {
    width: 11px; height: 7px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .check-box.checked .checkmark { opacity: 1; }

  .card-date {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    margin-top: 4px;
  }
  .card-date.no-date { color: var(--muted); }

  /* REQUIREMENTS PANEL */
  .reqs-panel {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    display: none;
  }
  .badge-card.open .reqs-panel { display: block; }

  .req-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    cursor: pointer;
  }

  .req-dot {
    width: 14px; height: 14px;
    border: 1.5px solid var(--border-hover);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .req-dot.done { background: var(--accent); border-color: var(--accent); }
  .req-dot.done::after { content: '✓'; font-size: 9px; color: white; line-height: 1; }

  .req-text-el {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    flex: 1;
    transition: color 0.15s;
  }
  .req-item:hover .req-text-el { color: var(--text); }
  .req-dot.done + .req-text-el { color: var(--muted); text-decoration: line-through; }

  .req-progress {
    height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 1px;
    margin-top: 8px;
    overflow: hidden;
  }
  .req-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  .expand-btn {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    background: none;
    border: none;
    padding: 0;
  }
  .expand-btn:hover { color: var(--text); }
  .expand-arrow { transition: transform 0.2s; display: inline-block; }
  .badge-card.open .expand-arrow { transform: rotate(180deg); }

  /* DATE EDITOR */
  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .date-row input[type=date] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    flex: 1;
  }
  .date-row input[type=date]:focus { border-color: var(--accent-dim); }
  .date-clear { font-size: 11px; color: var(--danger); cursor: pointer; background: none; border: none; font-family: 'DM Mono', monospace; padding: 0; }

  /* MARK EARNED BTN */
  .mark-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 6px;
    background: rgba(126,184,74,0.08);
    border: 1px solid var(--accent-dim);
    border-radius: 6px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .mark-btn:hover { background: var(--accent-dim); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 4rem; color: var(--muted); font-style: italic; font-size: 14px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition-duration: 0.01ms !important; }
  }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .badge-grid { grid-template-columns: 1fr 1fr; }
    .eagle-progress { flex-direction: column; }
    h1 { font-size: 3rem; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-left">
      <div class="fleur">Boy Scouts of America</div>
      <h1>Merit Badge<br><span>Tracker</span></h1>
      <p class="header-sub">Eagle Scout track — click any badge to log progress & requirements</p>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Tracked</div></div>
    <div class="stat"><div class="stat-num green" id="s-earned">0</div><div class="stat-label">Earned</div></div>
    <div class="stat"><div class="stat-num blue" id="s-eagle-earned">0 / 21</div><div class="stat-label">Eagle Reqs</div></div>
    <div class="stat"><div class="stat-num gold" id="s-progress">0</div><div class="stat-label">In Progress</div></div>
  </div>

  <div class="eagle-progress" id="eagle-bar">
    <div class="ring-wrap">
      <svg class="ring" width="80" height="80" viewBox="0 0 80 80">
        <circle class="ring-track" cx="40" cy="40" r="34"/>
        <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
        <g transform="rotate(90 40 40)">
          <text class="ring-label" x="40" y="36" id="ring-pct">0%</text>
          <text class="ring-sub" x="40" y="50">EAGLE</text>
        </g>
      </svg>
    </div>
    <div class="eagle-bar-wrap">
      <div class="eagle-text"><h3>Eagle Scout Requirements</h3><p id="eagle-desc">Complete all 21 Eagle-required merit badges to advance.</p></div>
      <div class="eagle-badges-preview" id="eagle-preview"></div>
    </div>
  </div>

  <div class="controls" id="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search badges..." oninput="render()">
    </div>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('earned',this)">Earned</button>
    <button class="filter-btn" onclick="setFilter('in-progress',this)">In Progress</button>
    <button class="filter-btn eagle-filter" onclick="setFilter('eagle',this)">Eagle Reqs</button>
  </div>

  <div id="main-content"></div>
</div>

<script>
const EAGLE_REQUIRED = new Set([
  'Camping','Citizenship in the Community','Citizenship in the Nation','Citizenship in the World',
  'Citizenship in Society','Communication','Cooking','Emergency Preparedness',
  'Environmental Science','Family Life','First Aid','Lifesaving','Personal Fitness',
  'Personal Management','Swimming','Cycling','Hiking','Rowing','Sustainability'
]);

const CATEGORIES = {
  'Citizenship': ['Citizenship in the Community','Citizenship in the Nation','Citizenship in the World','Citizenship in Society','American Cultures','American Heritage','American Labor'],
  'Communication & Arts': ['Art','Communication','Digital Technology','Journalism','Music','Photography','Public Health','Public Speaking','Radio','Theater','Graphic Arts','Animation','Game Design'],

// All 138 BSA merit badges
const ALL_BADGES_RAW = [
  'American Business','American Cultures','American Heritage','American Labor','Animal Science',
  'Animation','Archaeology','Archery','Architecture','Art','Astronomy','Athletics',
  'Atomic Energy','Aviation','Backpacking','Basketry','Bird Study','Bugling',
  'Camping','Canoeing','Chemistry','Chess','Citizenship in the Community',
  'Citizenship in the Nation','Citizenship in Society','Citizenship in the World',
  'Climbing','Coin Collecting','Collections','Communication','Composite Materials',
  'Computers','Construction','Consumer Economics','Cooking','Crime Prevention','Cycling',
  'Dentistry','Digital Technology','Disabilities Awareness','Dog Care','Drafting',
  'Electricity','Electronics','Emergency Preparedness','Energy','Engineering',
  'Entrepreneurship','Environmental Science','Exploration','Family Life','Farm Mechanics',
  'Fingerprinting','Fire Safety','First Aid','Fish & Wildlife Management','Fishing',
  'Fly Fishing','Forestry','Game Design','Genealogy','Geocaching','Geology',
  'Golf','Graphic Arts','Hiking','Home Repairs','Horsemanship','Indian Lore',
  'Insect Study','Inventing','Journalism','Kayaking','Landscape Architecture','Law',
  'Leatherwork','Lifesaving','Mammal Study','Manufacturing','Medicine','Metalwork',
  'Mining in Society','Model Design & Building','Motorboating','Music','Nature',
  'Nuclear Science','Oceanography','Orienteering','Painting','Personal Fitness',
  'Personal Management','Photography','Pioneering','Plant Science','Plumbing',
  'Pottery','Programming','Public Health','Public Speaking','Pulp & Paper',
  'Radio','Railroading','Reading','Real Estate','Reptile & Amphibian Study',
  'Rifle Shooting','Robotics','Rowing','Safety','Salesmanship','Scholarship',
  'Sculpture','Search and Rescue','Shotgun Shooting','Signs Signals & Codes','Skating',
  'Small-Boat Sailing','Snow Sports','Soil & Water Conservation','Space Exploration',
  'Sports','Stamp Collecting','Surveying','Sustainability','Swimming','Textile',
  'Theater','Traffic Safety','Truck Transportation','Veterinary Medicine','Water Sports',
  'Weather','Welding','Whitewater','Wilderness Survival','Wood Carving','Woodcarving',
  'Nuclear Science','Oceanography'
];

// Deduplicate and sort
const ALL_BADGES = [...new Set(ALL_BADGES_RAW)].sort();

const DEFAULT_REQS = {
  'First Aid': ['Understand bloodborne pathogens and disease prevention','Demonstrate CPR on a mannequin (adult, child, infant)','Show treatment for shock','Demonstrate treatment for choking','Show how to treat burns and scalds','Demonstrate bandaging techniques','Show treatment for fractures and sprains','Explain how to prevent poisoning accidents','Demonstrate how to help someone who is having a seizure'],
  'Swimming': ['Demonstrate ability to swim 100 yards continuously','Show survival float for at least 5 minutes','Explain the buddy system and safe swim guidelines','Describe common water hazards and prevention','Demonstrate reaching and throwing rescues','Swim underwater for 15 feet','Float on back for 1 minute'],
  'Cooking': ['Explain food safety and nutrition fundamentals','Demonstrate proper knife skills and kitchen safety','Cook breakfast outdoors on a camp stove','Plan and cook a trail meal','Cook a Dutch oven or foil pack meal','Prepare a meal with proper food storage and cleanup','Discuss dietary needs and nutrition labels'],
  'Camping': ['Explain Leave No Trace principles','Complete 20 nights of camping','Demonstrate how to use a map and compass','Show how to build and strike camp properly','Plan a 72-hour emergency preparedness kit','Identify local edible and poisonous plants','Cook two meals at a campsite'],
  'Programming': ['Discuss software development lifecycle','Explain the role of algorithms and data structures','Build an app or website that solves a real problem','Explain cybersecurity best practices','Present your program to your counselor'],
  'Citizenship in the Community': ['Define citizenship and explain its responsibilities','Interview a local government official','Attend a public meeting','Volunteer in a community project','Draw a map of your community','List community organizations and their roles'],
  'Personal Management': ['Create a written personal budget for 13 consecutive weeks','Open and maintain a bank account','Discuss the importance of investing and compound interest','Learn about insurance and taxes','Create a personal résumé'],
  'Environmental Science': ['Conduct an ecology study of a local ecosystem','Learn about soil and water conservation','Study air and land pollution and their effects','Explore energy resources and conservation','Discuss how environmental laws protect the ecosystem'],
};

function getCat(name) {
  for (const [cat, list] of Object.entries(CATEGORIES)) {
    if (list.includes(name)) return cat;
  }
  return 'Other';
}

function loadData() {
  try { return JSON.parse(localStorage.getItem('mb-v2') || 'null'); } catch(e) { return null; }
}
function saveData(d) { localStorage.setItem('mb-v2', JSON.stringify(d)); }

let data = loadData() || {};
// Ensure all badges exist
ALL_BADGES.forEach(name => {
  if (!data[name]) data[name] = { earned: false, date: null, reqs: (DEFAULT_REQS[name] || []).map(t=>({text:t,done:false})) };
});
saveData(data);

let filter = 'all';

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getStatus(name) {
  const d = data[name];
  if (d.earned) return 'earned';
  const done = d.reqs.filter(r=>r.done).length;
  if (done > 0) return 'in-progress';
  return 'not-started';
}

function updateStats() {
  const names = ALL_BADGES;
  const earned = names.filter(n=>data[n].earned).length;
  const inProg = names.filter(n=>getStatus(n)==='in-progress').length;
  const eagleEarned = [...EAGLE_REQUIRED].filter(n=>data[n]&&data[n].earned).length;

  document.getElementById('s-total').textContent = earned + inProg;
  document.getElementById('s-earned').textContent = earned;
  document.getElementById('s-eagle-earned').textContent = eagleEarned + ' / ' + EAGLE_REQUIRED.size;
  document.getElementById('s-progress').textContent = inProg;

  const pct = Math.round(eagleEarned / EAGLE_REQUIRED.size * 100);
  document.getElementById('ring-pct').textContent = pct + '%';
  const circ = 213.6;
  document.getElementById('ring-fill').style.strokeDashoffset = circ - (circ * pct / 100);

  const eagleNames = [...EAGLE_REQUIRED].sort();
  document.getElementById('eagle-desc').textContent =
    eagleEarned === EAGLE_REQUIRED.size
      ? 'All Eagle-required merit badges earned. Outstanding!'
      : `${EAGLE_REQUIRED.size - eagleEarned} Eagle-required badge${EAGLE_REQUIRED.size-eagleEarned===1?'':'s'} remaining.`;

  document.getElementById('eagle-preview').innerHTML = eagleNames.map(n => {
    const earned = data[n]&&data[n].earned;
    return `<span class="eagle-mini ${earned?'done':'todo'}">${n}</span>`;
  }).join('');
}

function toggleEarned(name, e) {
  e.stopPropagation();
  data[name].earned = !data[name].earned;
  if (data[name].earned) {
    if (!data[name].date) data[name].date = new Date().toISOString().slice(0,10);
    data[name].reqs.forEach(r=>r.done=true);
  }
  saveData(data);
  render();
}

function toggleReq(name, idx, e) {
  e.stopPropagation();
  data[name].reqs[idx].done = !data[name].reqs[idx].done;
  saveData(data);
  renderCard(name);
  updateStats();
}

function toggleOpen(name) {
  const el = document.getElementById('card-'+CSS.escape(name));
  if (el) el.classList.toggle('open');
}

function setDate(name, val) {
  data[name].date = val || null;
  saveData(data);
  renderCard(name);
}

function markEarned(name, e) {
  e.stopPropagation();
  data[name].earned = true;
  data[name].date = new Date().toISOString().slice(0,10);
  data[name].reqs.forEach(r=>r.done=true);
  saveData(data);
  render();
}

function renderCard(name) {
  const d = data[name];
  const status = getStatus(name);
  const isEagle = EAGLE_REQUIRED.has(name);
  const el = document.getElementById('card-'+CSS.escape(name));
  if (!el) return;

  const doneCount = d.reqs.filter(r=>r.done).length;
  const pct = d.reqs.length ? Math.round(doneCount/d.reqs.length*100) : 0;
  const dateStr = d.date ? new Date(d.date+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : null;

  el.className = 'badge-card' + (status==='earned'?' earned':'') + (isEagle?' eagle-req':'');

  el.querySelector('.card-inner').innerHTML = `
    <div class="card-top">
      <div>
        <div class="badge-name">${name}</div>
        <div class="badge-tags" style="margin-top:4px">
          ${isEagle?'<span class="tag eagle">Eagle</span>':''}
          <span class="tag cat">${getCat(name)}</span>
        </div>
      </div>
      <div class="check-box ${d.earned?'checked':''}" onclick="toggleEarned('${name.replace(/'/g,"\\'")}',event)">
        <div class="checkmark"></div>
      </div>
    </div>
    ${dateStr?`<div class="card-date">✓ Earned ${dateStr}</div>`:
      status==='in-progress'?`<div class="card-date no-date">${doneCount}/${d.reqs.length} reqs done</div>`:''}
    <button class="expand-btn" onclick="event.stopPropagation();toggleOpen('${name.replace(/'/g,"\\'")}')">
      ${d.reqs.length} requirements <span class="expand-arrow">▾</span>
    </button>
    <div class="reqs-panel">
      ${d.reqs.map((r,i)=>`
        <div class="req-item" onclick="toggleReq('${name.replace(/'/g,"\\'")}',${i},event)">
          <div class="req-dot ${r.done?'done':''}"></div>
          <span class="req-text-el">${r.text}</span>
        </div>`).join('')}
      ${d.reqs.length?`<div class="req-progress"><div class="req-progress-fill" style="width:${pct}%"></div></div>`:''}
      <div class="date-row" onclick="event.stopPropagation()">
        <input type="date" value="${d.date||''}" onchange="setDate('${name.replace(/'/g,"\\'")}',this.value)" title="Date earned">
        ${d.date?`<button class="date-clear" onclick="setDate('${name.replace(/'/g,"\\'")}','')">clear</button>`:''}
      </div>
      ${!d.earned?`<button class="mark-btn" onclick="markEarned('${name.replace(/'/g,"\\'")}',event)">✓ Mark as Earned</button>`:''}
    </div>
  `;
}

function render() {
  updateStats();
  const q = document.getElementById('search').value.toLowerCase();
  let names = ALL_BADGES.filter(n => {
    if (q && !n.toLowerCase().includes(q)) return false;
    if (filter === 'earned') return data[n].earned;
    if (filter === 'in-progress') return getStatus(n)==='in-progress';
    if (filter === 'eagle') return EAGLE_REQUIRED.has(n);
    return true;
  });

  // Group by category
  const byCat = {};
  names.forEach(n => {
    const cat = getCat(n);
    if (!byCat[cat]) byCat[cat] = [];
    byCat[cat].push(n);
  });

  const catOrder = ['Citizenship','Emergency Prep','Environment','Family & Community','Health & Sports','STEM','Outdoor Skills','Communication & Arts','Hobbies','Industry & Business','Other'];

  let html = '';
  if (!names.length) { html = '<div class="empty">No badges match your filter.</div>'; }
  else {
    catOrder.forEach(cat => {
      if (!byCat[cat] || !byCat[cat].length) return;
      html += `<div class="section-header">
        <h2>${cat}</h2>
        <div class="section-line"></div>
        <div class="section-count">${byCat[cat].length}</div>
      </div>
      <div class="badge-grid">
        ${byCat[cat].map((n,i)=>`
          <div class="badge-card${data[n].earned?' earned':''}${EAGLE_REQUIRED.has(n)?' eagle-req':''}" id="card-${CSS.escape(n)}" style="animation-delay:${i*0.02}s" onclick="toggleOpen('${n.replace(/'/g,"\\'")}')">
            <div class="card-inner"></div>
          </div>`).join('')}
      </div>`;
    });
    if (byCat['Other']?.length) {
      html += `<div class="section-header"><h2>Other</h2><div class="section-line"></div><div class="section-count">${byCat['Other'].length}</div></div>
      <div class="badge-grid">${byCat['Other'].map((n,i)=>`
        <div class="badge-card${data[n].earned?' earned':''}${EAGLE_REQUIRED.has(n)?' eagle-req':''}" id="card-${CSS.escape(n)}" style="animation-delay:${i*0.02}s" onclick="toggleOpen('${n.replace(/'/g,"\\'")}')">
          <div class="card-inner"></div>
        </div>`).join('')}</div>`;
    }
  }

  document.getElementById('main-content').innerHTML = html;
  names.forEach(n => renderCard(n));
}

render();
</script>
</body>
</html>
