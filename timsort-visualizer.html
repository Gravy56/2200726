<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMSORT // VISUALIZER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #0f0f18;
    --border: #1e1e32;
    --accent: #00ffe0;
    --accent2: #ff6b35;
    --accent3: #7b61ff;
    --run-color: #00ffe0;
    --merge-color: #ff6b35;
    --compare-color: #fff176;
    --sorted-color: #69ff84;
    --default-color: #2a2a4a;
    --text: #c8c8e8;
    --dim: #555577;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Bebas Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    background: var(--panel);
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 2.8rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,224,0.4);
    line-height: 1;
  }

  header .subtitle {
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .status-bar {
    margin-left: auto;
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 2px;
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .status-bar span { color: var(--accent); }

  .main {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 0;
    height: calc(100vh - 69px);
  }

  /* ── Canvas area ── */
  .canvas-area {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: hidden;
  }

  #bar-container {
    flex: 1;
    display: flex;
    align-items: flex-end;
    gap: 1px;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px 12px 0;
    position: relative;
    overflow: hidden;
  }

  /* subtle grid lines */
  #bar-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.02) 50px),
      repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.02) 50px);
    pointer-events: none;
  }

  .bar {
    flex: 1;
    min-width: 1px;
    background: var(--default-color);
    transition: background 0.05s;
    position: relative;
  }

  .bar.run      { background: var(--run-color); box-shadow: 0 0 6px rgba(0,255,224,0.5); }
  .bar.merge    { background: var(--merge-color); box-shadow: 0 0 6px rgba(255,107,53,0.5); }
  .bar.compare  { background: var(--compare-color); box-shadow: 0 0 6px rgba(255,241,118,0.7); }
  .bar.sorted   { background: var(--sorted-color); }

  /* phase label */
  .phase-display {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    font-size: 0.75rem;
    letter-spacing: 2px;
  }

  .phase-display .phase-label {
    font-family: var(--font-display);
    font-size: 1.4rem;
    letter-spacing: 3px;
  }

  .phase-display .step-info {
    color: var(--dim);
    margin-left: auto;
  }

  /* legend */
  .legend {
    display: flex;
    gap: 20px;
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--dim);
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  /* ── Sidebar ── */
  .sidebar {
    border-left: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    border-bottom: 1px solid var(--border);
    padding: 18px 20px;
  }

  .sidebar-section h2 {
    font-family: var(--font-display);
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 14px;
  }

  /* controls */
  .control-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
  }

  .control-row label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: var(--border);
    outline: none;
    border-radius: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 0;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,255,224,0.6);
  }

  .val-display {
    font-size: 0.8rem;
    color: var(--accent);
    text-align: right;
  }

  /* dataset buttons */
  .dataset-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .ds-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 1px;
    padding: 7px 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    text-align: center;
  }
  .ds-btn:hover, .ds-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,224,0.05);
  }

  /* main buttons */
  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 1rem;
    letter-spacing: 3px;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 16px rgba(0,255,224,0.4);
  }
  .btn.danger {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn.danger:hover {
    background: var(--accent2);
    color: var(--bg);
    box-shadow: 0 0 16px rgba(255,107,53,0.4);
  }
  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .btn:disabled:hover {
    background: transparent;
    color: var(--accent);
    box-shadow: none;
  }

  /* stats */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px;
  }

  .stat-box .stat-label {
    font-size: 0.58rem;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .stat-box .stat-val {
    font-family: var(--font-display);
    font-size: 1.5rem;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1.2;
  }

  .stat-box.orange .stat-val { color: var(--accent2); }
  .stat-box.purple .stat-val { color: var(--accent3); }
  .stat-box.green  .stat-val { color: var(--sorted-color); }

  /* log */
  .log-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px 20px;
    font-size: 0.65rem;
    line-height: 1.7;
    color: var(--dim);
  }

  .log-area::-webkit-scrollbar { width: 4px; }
  .log-area::-webkit-scrollbar-track { background: transparent; }
  .log-area::-webkit-scrollbar-thumb { background: var(--border); }

  .log-line { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 2px 0; }
  .log-line.highlight { color: var(--accent); }
  .log-line.warn { color: var(--accent2); }
  .log-line.done { color: var(--sorted-color); }

  /* completion overlay */
  #done-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,15,0.85);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  #done-overlay.show { display: flex; }

  #done-overlay .done-title {
    font-family: var(--font-display);
    font-size: 4rem;
    letter-spacing: 8px;
    color: var(--sorted-color);
    text-shadow: 0 0 30px rgba(105,255,132,0.6);
    animation: pulse 1.5s ease-in-out infinite;
  }

  #done-overlay .done-sub {
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: var(--dim);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
</style>
</head>
<body>

<header>
  <h1>TIMSORT</h1>
  <div class="subtitle">Algorithm Visualizer // v1.0</div>
  <div class="status-bar">
    <div>MIN_RUN <span>32</span></div>
    <div>COMPLEXITY <span>O(n log n)</span></div>
    <div id="clock">00:00.000</div>
  </div>
</header>

<div class="main">
  <div class="canvas-area">

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--default-color)"></div>UNSORTED</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--run-color)"></div>INSERTION SORT RUN</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--compare-color)"></div>COMPARING</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--merge-color)"></div>MERGING</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--sorted-color)"></div>SORTED</div>
    </div>

    <div id="bar-container">
      <div id="done-overlay">
        <div class="done-title">SORTED</div>
        <div class="done-sub">TIMSORT COMPLETE</div>
      </div>
    </div>

    <div class="phase-display">
      <div class="phase-label" id="phase-label" style="color:var(--dim)">READY</div>
      <div id="phase-desc" style="font-size:0.7rem;color:var(--dim);letter-spacing:1px">Press START to begin visualization</div>
      <div class="step-info" id="step-info">STEP — / —</div>
    </div>

  </div>

  <div class="sidebar">

    <div class="sidebar-section">
      <h2>// CONFIG</h2>
      <div class="control-row">
        <label>Array Size <span class="val-display" id="size-val">80</span></label>
        <input type="range" id="size-slider" min="20" max="200" value="80">
      </div>
      <div class="control-row">
        <label>Speed <span class="val-display" id="speed-val">MED</span></label>
        <input type="range" id="speed-slider" min="1" max="5" value="3">
      </div>
    </div>

    <div class="sidebar-section">
      <h2>// DATASET</h2>
      <div class="dataset-btns">
        <button class="ds-btn active" data-type="random">Random</button>
        <button class="ds-btn" data-type="nearly">Nearly Sorted</button>
        <button class="ds-btn" data-type="reversed">Reversed</button>
        <button class="ds-btn" data-type="few-unique">Few Unique</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h2>// CONTROLS</h2>
      <div class="btn-row" style="margin-bottom:8px">
        <button class="btn" id="start-btn">START</button>
        <button class="btn danger" id="reset-btn">RESET</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h2>// STATS</h2>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-label">Comparisons</div>
          <div class="stat-val" id="stat-cmp">0</div>
        </div>
        <div class="stat-box orange">
          <div class="stat-label">Writes</div>
          <div class="stat-val" id="stat-writes">0</div>
        </div>
        <div class="stat-box purple">
          <div class="stat-label">Runs</div>
          <div class="stat-val" id="stat-runs">0</div>
        </div>
        <div class="stat-box green">
          <div class="stat-label">Merges</div>
          <div class="stat-val" id="stat-merges">0</div>
        </div>
      </div>
    </div>

    <div class="log-area" id="log"></div>

  </div>
</div>

<script>
const MIN_RUN = 32;
const speedMap = { 1: 120, 2: 50, 3: 20, 4: 8, 5: 1 };
const speedLabels = { 1: 'SLOW', 2: 'LOW', 3: 'MED', 4: 'FAST', 5: 'MAX' };

let arr = [], bars = [], steps = [], stepIdx = 0;
let running = false, animHandle = null, lastTime = 0;
let stats = { cmp: 0, writes: 0, runs: 0, merges: 0 };
let dataType = 'random';

// ── DOM refs ──
const container   = document.getElementById('bar-container');
const overlay     = document.getElementById('done-overlay');
const phaseLabel  = document.getElementById('phase-label');
const phaseDesc   = document.getElementById('phase-desc');
const stepInfo    = document.getElementById('step-info');
const startBtn    = document.getElementById('start-btn');
const resetBtn    = document.getElementById('reset-btn');
const sizeSlider  = document.getElementById('size-slider');
const speedSlider = document.getElementById('speed-slider');
const sizeVal     = document.getElementById('size-val');
const speedVal    = document.getElementById('speed-val');
const logEl       = document.getElementById('log');

// ── Generate array ──
function generateArray(n) {
  switch (dataType) {
    case 'nearly':
      arr = Array.from({length: n}, (_, i) => i + 1);
      for (let i = 0; i < Math.max(3, n * 0.05); i++) {
        let a = Math.random() * n | 0, b = Math.random() * n | 0;
        [arr[a], arr[b]] = [arr[b], arr[a]];
      }
      break;
    case 'reversed':
      arr = Array.from({length: n}, (_, i) => n - i);
      break;
    case 'few-unique':
      arr = Array.from({length: n}, () => (Math.random() * 5 | 0) + 1);
      break;
    default:
      arr = Array.from({length: n}, () => Math.floor(Math.random() * n) + 1);
  }
}

// ── Build bars ──
function buildBars() {
  container.innerHTML = '';
  overlay.classList.remove('show');
  bars = [];
  const max = Math.max(...arr);
  arr.forEach(v => {
    const b = document.createElement('div');
    b.className = 'bar';
    b.style.height = (v / max * 100) + '%';
    container.appendChild(b);
    bars.push(b);
  });
}

// ── Record steps ──
function recordSteps(a) {
  const steps = [];
  const n = a.length;
  let sc = 0, sw = 0, sr = 0, sm = 0;

  // Phase 1: insertion sort each run
  for (let i = 0; i < n; i += MIN_RUN) {
    const end = Math.min(i + MIN_RUN - 1, n - 1);
    sr++;
    steps.push({ type: 'run-start', left: i, right: end, runs: sr,
      msg: `RUN #${sr}: insertion sort [${i}..${end}]` });

    for (let j = i + 1; j <= end; j++) {
      let key = a[j], k = j - 1;
      while (k >= i && a[k] > key) {
        sc++;
        steps.push({ type: 'compare', i: k, j: k + 1, cmp: sc, writes: sw, runs: sr, merges: sm });
        a[k + 1] = a[k];
        sw++;
        steps.push({ type: 'write', i: k + 1, val: a[k + 1], arr: [...a], cmp: sc, writes: sw, runs: sr, merges: sm });
        k--;
      }
      a[k + 1] = key;
      sw++;
      steps.push({ type: 'write', i: k + 1, val: key, arr: [...a], cmp: sc, writes: sw, runs: sr, merges: sm });
    }
    steps.push({ type: 'run-done', left: i, right: end, runs: sr, merges: sm, cmp: sc, writes: sw });
  }

  // Phase 2: merge passes
  for (let size = MIN_RUN; size < n; size *= 2) {
    for (let left = 0; left < n; left += 2 * size) {
      const mid   = Math.min(left + size - 1, n - 1);
      const right = Math.min(left + 2 * size - 1, n - 1);
      if (mid >= right) continue;
      sm++;
      steps.push({ type: 'merge-start', left, mid, right, merges: sm, cmp: sc, writes: sw, runs: sr,
        msg: `MERGE #${sm}: [${left}..${mid}] + [${mid+1}..${right}]` });

      // perform merge
      const len1 = mid - left + 1, len2 = right - mid;
      const L = a.slice(left, left + len1);
      const R = a.slice(mid + 1, mid + 1 + len2);
      let i2 = 0, j = 0, k = left;
      while (i2 < len1 && j < len2) {
        sc++;
        steps.push({ type: 'merge-compare', i: left + i2, j: mid + 1 + j, k, cmp: sc, writes: sw, runs: sr, merges: sm });
        if (L[i2] <= R[j]) { a[k] = L[i2++]; } else { a[k] = R[j++]; }
        sw++;
        steps.push({ type: 'merge-write', idx: k, arr: [...a], left, right, cmp: sc, writes: sw, runs: sr, merges: sm });
        k++;
      }
      while (i2 < len1) {
        a[k] = L[i2++]; sw++;
        steps.push({ type: 'merge-write', idx: k, arr: [...a], left, right, cmp: sc, writes: sw, runs: sr, merges: sm });
        k++;
      }
      while (j < len2) {
        a[k] = R[j++]; sw++;
        steps.push({ type: 'merge-write', idx: k, arr: [...a], left, right, cmp: sc, writes: sw, runs: sr, merges: sm });
        k++;
      }
      steps.push({ type: 'merge-done', left, right, merges: sm, cmp: sc, writes: sw, runs: sr });
    }
  }
  steps.push({ type: 'done', cmp: sc, writes: sw, runs: sr, merges: sm });
  return steps;
}

// ── Color states ──
let barStates = [];

function applyStep(step) {
  const max = Math.max(...arr);

  if (step.arr) {
    step.arr.forEach((v, i) => {
      bars[i].style.height = (v / max * 100) + '%';
    });
  }

  // clear all
  bars.forEach(b => b.className = 'bar');

  switch (step.type) {
    case 'run-start':
      for (let i = step.left; i <= step.right; i++) bars[i].className = 'bar run';
      phaseLabel.style.color = 'var(--run-color)';
      phaseLabel.textContent = 'INSERTION SORT';
      phaseDesc.textContent = step.msg;
      break;

    case 'compare':
      bars[step.i].className = 'bar compare';
      bars[step.j].className = 'bar compare';
      break;

    case 'write':
      bars[step.i].className = 'bar run';
      break;

    case 'run-done':
      for (let i = step.left; i <= step.right; i++) bars[i].className = 'bar sorted';
      break;

    case 'merge-start':
      for (let i = step.left; i <= step.right; i++) bars[i].className = 'bar merge';
      phaseLabel.style.color = 'var(--merge-color)';
      phaseLabel.textContent = 'MERGE';
      phaseDesc.textContent = step.msg;
      addLog(step.msg, 'warn');
      break;

    case 'merge-compare':
      bars[step.i].className = 'bar compare';
      bars[step.j].className = 'bar compare';
      break;

    case 'merge-write':
      if (step.arr) {
        for (let i = step.left; i <= step.right; i++) bars[i].className = 'bar merge';
        bars[step.idx].className = 'bar run';
      }
      break;

    case 'merge-done':
      for (let i = step.left; i <= step.right; i++) bars[i].className = 'bar sorted';
      break;

    case 'done':
      bars.forEach(b => b.className = 'bar sorted');
      phaseLabel.style.color = 'var(--sorted-color)';
      phaseLabel.textContent = 'COMPLETE';
      phaseDesc.textContent = `Sorted in ${step.cmp} comparisons, ${step.writes} writes`;
      overlay.classList.add('show');
      addLog(`✓ SORT COMPLETE — ${step.cmp} cmps, ${step.writes} writes, ${step.runs} runs, ${step.merges} merges`, 'done');
      break;
  }

  if (step.cmp !== undefined) {
    document.getElementById('stat-cmp').textContent    = step.cmp;
    document.getElementById('stat-writes').textContent = step.writes;
    document.getElementById('stat-runs').textContent   = step.runs;
    document.getElementById('stat-merges').textContent = step.merges;
  }

  stepInfo.textContent = `STEP ${stepIdx} / ${steps.length}`;
}

// ── Animation loop ──
let delay = 20;

function animate(ts) {
  if (!running) return;
  if (ts - lastTime < delay) { animHandle = requestAnimationFrame(animate); return; }
  lastTime = ts;

  if (stepIdx >= steps.length) {
    running = false;
    startBtn.textContent = 'START';
    startBtn.disabled = false;
    return;
  }

  applyStep(steps[stepIdx]);
  stepIdx++;
  animHandle = requestAnimationFrame(animate);
}

// ── Log ──
function addLog(msg, cls = '') {
  const line = document.createElement('div');
  line.className = 'log-line' + (cls ? ' ' + cls : '');
  line.textContent = '> ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Init ──
function init() {
  cancelAnimationFrame(animHandle);
  running = false;
  stepIdx = 0;
  overlay.classList.remove('show');
  logEl.innerHTML = '';
  document.getElementById('stat-cmp').textContent    = '0';
  document.getElementById('stat-writes').textContent = '0';
  document.getElementById('stat-runs').textContent   = '0';
  document.getElementById('stat-merges').textContent = '0';
  phaseLabel.style.color = 'var(--dim)';
  phaseLabel.textContent = 'READY';
  phaseDesc.textContent  = 'Press START to begin visualization';
  stepInfo.textContent   = 'STEP — / —';
  startBtn.textContent   = 'START';
  startBtn.disabled      = false;

  const n = parseInt(sizeSlider.value);
  generateArray(n);
  buildBars();
  const copy = [...arr];
  steps = recordSteps(copy);
  addLog(`Array generated: ${n} elements [${dataType}]`, 'highlight');
  addLog(`Steps recorded: ${steps.length}`);
}

// ── Events ──
startBtn.addEventListener('click', () => {
  if (running) {
    running = false;
    cancelAnimationFrame(animHandle);
    startBtn.textContent = 'RESUME';
  } else {
    if (stepIdx >= steps.length) init();
    running = true;
    delay = speedMap[speedSlider.value];
    startBtn.textContent = 'PAUSE';
    addLog('Visualization started', 'highlight');
    animHandle = requestAnimationFrame(animate);
  }
});

resetBtn.addEventListener('click', init);

sizeSlider.addEventListener('input', () => {
  sizeVal.textContent = sizeSlider.value;
  init();
});

speedSlider.addEventListener('input', () => {
  speedVal.textContent = speedLabels[speedSlider.value];
  delay = speedMap[speedSlider.value];
});

document.querySelectorAll('.ds-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ds-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dataType = btn.dataset.type;
    init();
  });
});

// clock
setInterval(() => {
  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getMinutes()).padStart(2,'0') + ':' +
    String(d.getSeconds()).padStart(2,'0') + '.' +
    String(d.getMilliseconds()).padStart(3,'0');
}, 50);

init();
</script>
</body>
</html>
